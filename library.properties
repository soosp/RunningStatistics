name=RunningStatistics
version=1.0.1
author=Péter Soós
maintainer=Péter Soós
sentence=General-purpose sliding window and cumulative statistics for time-series data on embedded systems.
paragraph=RollingStats provides bin-based sliding window statistics (average, min, max, stddev) with compile-time sizing and no dynamic memory allocation. CumulativeStats provides lifetime statistics and dose accumulation using Welford's numerically stable algorithm. Both classes are hardware-independent — the caller provides the timestamp. Designed for use with GeigerMeasurement but applicable to any time-series sensor data.
category=Data Processing
